<body class="min-vh-100 bg-light text-dark">

  
<!-- HEADER -->
<header class="bg-white shadow-sm position-sticky top-0" style="z-index: 1000;">
  <div class="container px-3 px-md-4 py-2 py-md-3 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2 gap-md-3 animate-fade-in">
      <img src="./assets/images/logo 1.png" alt="Logo" class="rounded shadow-sm" style="width:32px;height:32px">
      <h1 class="h6 fw-bold mb-0">Exam Performance</h1>
    </div>
    <div class="d-flex gap-2 animate-fade-in">
      <button onclick="window.location.href='index.html'" class="btn btn-outline-secondary btn-sm px-2 px-md-3">Home</button>
      <button onclick="window.location.href='admin.html'" class="btn btn-primary btn-sm px-2 px-md-3">Admin</button>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main id="result-page" class="container py-4 py-md-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg animate-scale-in">
        <div class="card-body p-3 p-md-5">
          
          <div class="text-center mb-4 mb-md-5">
            <div class="icon-circle mx-auto mb-3 pulse-primary" style="width: 60px; height: 60px; font-size: 1.5rem;">
              <i class="bi bi-award-fill"></i>
            </div>
            <h2 class="h4 fw-bold text-dark mb-1">Examination Completed</h2>
            <p class="text-muted small">Great effort! Here is your detailed performance report.</p>
          </div>

          <!-- Score Circle -->
          <div class="d-flex justify-content-center mb-4 mb-md-5 animate-fade-in stagger-1">
            <div class="result-circle-container">
              <svg viewBox="0 0 100 100" class="w-100 h-100">
                <circle cx="50" cy="50" r="45" class="result-circle-bg" />
                <circle id="progress-circle" cx="50" cy="50" r="45" class="result-circle-progress" 
                        stroke-dasharray="283" stroke-dashoffset="283" />
              </svg>
              <div id="percentage-display" class="position-absolute top-50 start-50 translate-middle h3 fw-bold mb-0 text-primary">
                0%
              </div>
            </div>
          </div>

          <!-- Performance Card -->
          <div id="performance-card" class="p-3 rounded-pill text-center fw-bold mb-4 mb-md-5 animate-fade-in stagger-2 small">
          </div>

          <!-- Summary Grid -->
          <div class="card bg-light border-0 mb-4 mb-md-5 animate-fade-in stagger-3">
            <div class="card-body p-3 p-md-4">
              <div class="d-flex align-items-center gap-2 mb-3 mb-md-4 border-bottom pb-2">
                <i class="bi bi-list-check text-primary"></i>
                <h3 class="h6 fw-bold text-uppercase mb-0" style="letter-spacing: 0.05em">Detailed Summary</h3>
              </div>
              <div id="summary-grid" class="row g-3 g-md-4">
                <!-- Injected via JS -->
              </div>
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="d-grid d-md-flex justify-content-center gap-2 gap-md-3 mb-4 mb-md-5 animate-fade-in stagger-4">
            <a href="#review-section" class="btn btn-outline-primary px-4 d-flex align-items-center justify-content-center gap-2 hover-lift">
              <i class="bi bi-journal-text"></i> Review Questions
            </a>
            <button id="retry-wrong-btn" class="btn btn-primary px-4 d-flex align-items-center justify-content-center gap-2 hover-lift">
              <i class="bi bi-arrow-counterclockwise"></i> Retry Wrong
            </button>
            <a href="classroom.html" class="btn btn-danger fw-semibold d-inline-flex align-items-center gap-2">
            Open Classroom <i class="bi bi-arrow-right"></i>
          </a>
          </div>

          <!-- Question Review -->
          <div id="review-section" class="card bg-white border-0 mb-4 mb-md-5 animate-fade-in stagger-5 shadow-sm">
            <div class="card-body p-3 p-md-4">
              <div class="d-flex align-items-center gap-2 mb-3 mb-md-4 border-bottom pb-2">
                <i class="bi bi-journal-text text-primary"></i>
                <h3 class="h6 fw-bold text-uppercase mb-0" style="letter-spacing: 0.05em">Question Review</h3>
              </div>
              <div id="review-list" class="space-y-3">
                <!-- Review cards injected via JS -->
              </div>
            </div>
          </div>

          <!-- Export Buttons -->
          <div class="d-flex flex-wrap justify-content-center gap-2 gap-md-3 animate-fade-in stagger-5">
            <a href="classroom.html" class="btn btn-danger fw-semibold d-inline-flex align-items-center gap-2">
            Open Classroom <i class="bi bi-arrow-right"></i>
          </a>
            <button id="excel-btn" class="btn btn-success btn-sm px-3 d-flex align-items-center gap-2 hover-lift">
              <i class="bi bi-file-earmark-excel-fill"></i> Excel
            </button>
            <button id="pdf-btn" class="btn btn-danger btn-sm px-3 d-flex align-items-center gap-2 hover-lift">
              <i class="bi bi-file-earmark-pdf-fill"></i> PDF
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

  document.addEventListener('DOMContentLoaded', () => {
    checkAccess();
